<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAFTON CAFE — 업무 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAF8;--card:#FFF;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.13);
  --t1:#18181B;--t2:#71717A;--t3:#A1A1AA;
  --acc:#F59E0B;--acc-d:#D97706;
  --err:#EF4444;--err-bg:#FEF2F2;--err-t:#B91C1C;
  --wrn-bg:#FFFBEB;--wrn-t:#92400E;
  --ok-bg:#F0FDF4;--ok-t:#15803D;
  --inf-bg:#EFF6FF;--inf-t:#1D4ED8;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
  --font:"Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --sb-w:240px;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:15px;line-height:1.55;display:flex;min-height:100vh;}

/* SIDEBAR */
.sb{width:var(--sb-w);background:#18181B;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:30;overflow-y:auto;}
.sb-top{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:2px;}
.sb-ic{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sb-nm{font-size:14px;font-weight:500;color:#FAFAFA;}
.sb-sm{font-size:11px;color:#71717A;margin-top:1px;}
.sb-date{padding:9px 16px;font-size:12px;color:#52525B;border-bottom:1px solid rgba(255,255,255,.04);}
.sb-lbl{padding:13px 14px 5px;font-size:11px;color:#52525B;letter-spacing:.07em;text-transform:uppercase;}
.sf{display:flex;flex-direction:column;gap:1px;padding:0 9px 10px;}
.sf-b{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--r8);cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);font-size:13px;color:#A1A1AA;transition:background .12s,color .12s;}
.sf-b:hover{background:rgba(255,255,255,.05);color:#E4E4E7;}
.sf-b.on{background:rgba(245,158,11,.14);color:#F59E0B;}
.sf-l{display:flex;align-items:center;gap:7px;}
.sf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sf-n{font-size:12px;background:rgba(255,255,255,.09);color:#71717A;padding:1px 8px;border-radius:99px;}
.sf-b.on .sf-n{background:rgba(245,158,11,.2);color:#F59E0B;}
.sb-div{height:1px;background:rgba(255,255,255,.05);margin:4px 16px;}
.cat-list{padding:0 9px 10px;display:flex;flex-direction:column;gap:1px;}
.cat-b{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--r8);cursor:pointer;border:none;background:none;font-family:var(--font);font-size:13px;color:#A1A1AA;transition:background .12s,color .12s;width:100%;text-align:left;}
.cat-b:hover{background:rgba(255,255,255,.05);color:#E4E4E7;}
.cat-b.on{color:#FAFAFA;background:rgba(255,255,255,.08);}
.cat-sw{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.sb-foot{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);}
.sb-fb{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;border:none;background:none;font-family:var(--font);font-size:13px;color:#71717A;transition:all .12s;width:100%;}
.sb-fb:hover{background:rgba(255,255,255,.05);color:#E4E4E7;}

/* MAIN */
.main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:14px 24px;border-bottom:1px solid var(--bdr);background:var(--card);position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tb-t{font-size:17px;font-weight:500;}.tb-s{font-size:12px;color:var(--t2);margin-top:2px;}
.tb-r{display:flex;gap:7px;align-items:center;flex-shrink:0;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 24px;background:var(--card);}
.tab{padding:11px 18px;font-size:14px;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:var(--font);transition:color .12s,border-color .12s;}
.tab:hover{color:var(--t1);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500;}

/* VIEW */
.view{display:none;padding:16px 24px 40px;}.view.on{display:block;}

/* SEARCH/SORT ROW */
.toolrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.fsrch{padding:8px 12px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);background:var(--card);color:var(--t1);flex:1;min-width:140px;font-family:var(--font);}
.fsrch:focus{outline:none;border-color:var(--acc);}
.fsel2{font-size:13px;padding:8px 10px;border:1px solid var(--bdr2);border-radius:var(--r8);background:var(--card);color:var(--t1);font-family:var(--font);}
.drag-hint{display:none;padding:9px 14px;background:rgba(245,158,11,.07);border:1px dashed rgba(245,158,11,.35);border-radius:var(--r8);font-size:13px;color:var(--wrn-t);align-items:center;gap:7px;margin-bottom:12px;}
.drag-hint.show{display:flex;}

/* TASK CARD */
.tcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r16);margin-bottom:8px;overflow:hidden;transition:border-color .12s,opacity .15s;}
.tcard:hover{border-color:rgba(0,0,0,.13);}
.tcard.p0{border-left:3px solid var(--err);}
.tcard.p1{border-left:3px solid var(--acc);}
.tcard.drag-src{opacity:.3;border:1.5px dashed var(--acc);}
.tcard.drag-top{border-top:2.5px solid var(--acc);}
.tcard.drag-bot{border-bottom:2.5px solid var(--acc);}
.tc-hdr{padding:12px 14px;display:flex;align-items:flex-start;gap:5px;}
.tc-hdr:hover{background:#FAFAF6;}
.tc-drag{width:18px;flex-shrink:0;display:none;flex-direction:column;gap:3px;cursor:grab;opacity:0;transition:opacity .12s;padding-top:3px;align-items:center;}
.tc-drag:active{cursor:grabbing;}
.tc-drag span{display:block;width:11px;height:1.5px;background:var(--t2);border-radius:1px;}
.tcard:hover .tc-drag{opacity:.3;}.tc-drag:hover{opacity:.7!important;}
.sort-mode .tc-drag{display:flex;}
.tc-main{flex:1;min-width:0;cursor:pointer;}
.tc-r1{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.tc-ttl{font-size:14px;font-weight:500;flex:1;min-width:80px;line-height:1.4;}
.tc-r2{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap;}
.tc-meta{font-size:12px;color:var(--t2);display:flex;gap:11px;flex-wrap:wrap;align-items:center;}
.tc-tog{font-size:11px;color:var(--t3);}
.ddb{font-size:11px;padding:3px 8px;border-radius:var(--r4);font-weight:500;white-space:nowrap;}
.prog{height:3px;background:#F4F4F5;border-radius:2px;margin-top:7px;}
.prog-f{height:100%;border-radius:2px;background:var(--inf-t);transition:width .3s;}
.badge{font-size:11px;padding:3px 8px;border-radius:var(--r4);display:inline-block;white-space:nowrap;}
.sta-대기{background:#F4F4F5;color:#52525B;}
.sta-진행중{background:#EFF6FF;color:#1D4ED8;}
.sta-완료{background:#F0FDF4;color:#15803D;}
.sta-지연{background:#FEF2F2;color:#B91C1C;}

/* CARD BODY */
.tc-body{border-top:1px solid var(--bdr);padding:12px 14px;}
.tc-memo{font-size:12px;color:var(--t2);background:#FAFAF6;padding:7px 10px;border-radius:var(--r8);margin-bottom:10px;border-left:2px solid #E4E4E7;}
.step-hdr{font-size:12px;color:var(--t2);margin-bottom:5px;}
.step-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04);}
.step-item:last-child{border-bottom:none;}
.step-chk{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0;}
.step-lbl{font-size:13px;flex:1;}.step-lbl.done{color:var(--t3);text-decoration:line-through;}
.tc-acts{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.gcal-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;font-size:12px;border:1px solid #4285F4;border-radius:var(--r4);background:none;color:#4285F4;cursor:pointer;font-family:var(--font);transition:all .12s;}
.gcal-btn:hover{background:#4285F4;color:#fff;}
.gcal-ic{font-size:13px;}

/* EDIT FORM */
.tc-edit{border-top:1px solid var(--bdr);padding:14px;background:#FAFAF6;}
.egrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:10px;}
.efull{grid-column:1/-1;}.e2{grid-column:span 2;}
.elbl{font-size:12px;color:var(--t2);margin-bottom:3px;}
.efi,.esel{padding:7px 10px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);background:#fff;color:var(--t1);font-family:var(--font);width:100%;}
.efi:focus,.esel:focus{outline:none;border-color:var(--acc);}
.ser{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.sei{flex:1;padding:6px 9px;font-size:12px;border:1px solid var(--bdr2);border-radius:var(--r4);font-family:var(--font);background:#fff;color:var(--t1);}
.sei:focus{outline:none;border-color:var(--acc);}
.rm-s{width:22px;height:22px;border:1px solid var(--bdr2);border-radius:3px;background:none;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rm-s:hover{background:var(--err-bg);color:var(--err-t);}
.date-row{display:flex;gap:8px;align-items:flex-end;}
.date-row .fg{flex:1;}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:var(--r8);font-size:13px;cursor:pointer;border:1px solid var(--bdr2);font-family:var(--font);transition:all .12s;white-space:nowrap;}
.btn-p{background:var(--acc);color:#18181B;border-color:var(--acc);font-weight:500;}
.btn-p:hover{background:var(--acc-d);}
.btn-s{background:var(--card);color:var(--t2);}
.btn-s:hover{background:#F4F4F5;color:var(--t1);}
.btn-g{background:none;border:none;color:var(--t2);font-size:12px;padding:5px 9px;cursor:pointer;border-radius:var(--r4);font-family:var(--font);}
.btn-g:hover{background:#F4F4F5;color:var(--t1);}
.btn-del{background:none;border:none;color:var(--err-t);font-size:12px;padding:5px 9px;cursor:pointer;border-radius:var(--r4);font-family:var(--font);}
.btn-del:hover{background:var(--err-bg);}

/* ADD TASK */
.add-panel{display:none;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r16);padding:18px;margin-bottom:14px;}
.add-panel.open{display:block;}
.ap-t{font-size:14px;font-weight:500;margin-bottom:13px;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg-full{grid-column:1/-1;}.fg2{grid-column:span 2;}
.fl{font-size:12px;color:var(--t2);}
.fi,.fsel{padding:8px 10px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);background:#FAFAFA;color:var(--t1);font-family:var(--font);width:100%;}
.fi:focus,.fsel:focus{outline:none;border-color:var(--acc);background:#fff;}
.fi::placeholder{color:var(--t3);}
.sar{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
.sai{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);background:#FAFAFA;color:var(--t1);font-family:var(--font);}
.sai:focus{outline:none;border-color:var(--acc);}
.rm-btn{width:26px;height:26px;border:1px solid var(--bdr2);border-radius:5px;background:none;cursor:pointer;font-size:15px;color:var(--t2);display:flex;align-items:center;justify-content:center;}
.rm-btn:hover{background:#F4F4F5;}
.gcal-add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;border:1.5px solid #4285F4;border-radius:var(--r8);background:#fff;color:#4285F4;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s;}
.gcal-add-btn:hover{background:#4285F4;color:#fff;}

/* SETTINGS OVERLAY */
.set-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:110;overflow-y:auto;padding:24px 16px 40px;}
.set-ov.show{display:block;}
.set-wrap{background:#fff;width:100%;max-width:780px;border-radius:var(--r16);margin:0 auto;overflow:visible;}
.set-hdr{padding:18px 22px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:var(--r16) var(--r16) 0 0;z-index:2;}
.set-ht{font-size:15px;font-weight:500;}
.set-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);line-height:1;padding:2px 6px;border-radius:4px;}
.set-x:hover{background:#F4F4F5;color:var(--t1);}
.set-body{padding:20px 22px 24px;}
.set-cols{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;}
.set-col{min-width:0;}
.set-ct{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bdr);}
.set-item{display:flex;align-items:center;gap:6px;padding:6px 4px;border-bottom:1px solid rgba(0,0,0,.04);}
.set-item:last-of-type{border-bottom:none;}
.set-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.set-nm{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.set-ord{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.set-mv{background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;line-height:1;padding:2px 4px;border-radius:2px;}
.set-mv:hover{background:#F4F4F5;color:var(--t1);}
.set-rm{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;line-height:1;padding:2px 5px;border-radius:3px;flex-shrink:0;}
.set-rm:hover{background:var(--err-bg);color:var(--err-t);}
.set-add-row{display:flex;gap:7px;margin-top:10px;}
.set-inp{flex:1;min-width:0;padding:7px 10px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);font-family:var(--font);color:var(--t1);background:#FAFAFA;}
.set-inp:focus{outline:none;border-color:var(--acc);background:#fff;}
.set-sb{padding:7px 13px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r8);background:var(--card);cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;}
.set-sb:hover{background:#F4F4F5;}
.color-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.cpill{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .1s;}
.cpill.sel{border-color:#18181B;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.cal-month{font-size:17px;font-weight:500;min-width:150px;}
.cal-nav-btn{padding:6px 14px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--r8);background:var(--card);cursor:pointer;font-family:var(--font);}
.cal-nav-btn:hover{background:#F4F4F5;}
.cal-grid{border:1px solid var(--bdr);border-radius:var(--r12);overflow:hidden;}
.cal-weekrow{display:grid;grid-template-columns:repeat(7,1fr);background:#F9F9F7;border-bottom:1px solid var(--bdr);}
.cal-wlbl{padding:9px 0;text-align:center;font-size:12px;color:var(--t2);font-weight:500;}
.cal-wlbl:first-child{color:var(--err-t);}
.cal-wlbl:last-child{color:var(--inf-t);}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:110px;padding:7px;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);background:var(--card);vertical-align:top;position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month{background:#FAFAF8;}
.cal-cell.today{background:#FFFBEB;}
.cal-cell.today .cal-day{background:var(--acc);color:#18181B;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-day{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:5px;}
.cal-cell.other-month .cal-day{color:var(--t3);}
.cal-cell:nth-child(7n+1) .cal-day{color:var(--err-t);}
.cal-cell:nth-child(7n) .cal-day{color:var(--inf-t);}
.cal-event{font-size:11px;padding:2px 6px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.cal-event:hover{opacity:.8;}
.cal-more{font-size:11px;color:var(--t2);padding:1px 4px;cursor:pointer;}
.cal-more:hover{color:var(--t1);}

/* GCAL INFO */
.gcal-info{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--r8);padding:11px 15px;font-size:13px;color:var(--inf-t);margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.gcal-info-icon{font-size:16px;flex-shrink:0;}

.empty{padding:52px;text-align:center;color:var(--t2);font-size:14px;}
.toast{position:fixed;bottom:22px;right:22px;background:#18181B;color:#FAFAFA;padding:11px 18px;border-radius:var(--r12);font-size:13px;z-index:9999;opacity:0;transition:opacity .22s;pointer-events:none;max-width:320px;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- 연결 상태 바 -->
<div id="fb-status" style="position:fixed;top:0;left:0;right:0;z-index:200;text-align:center;padding:6px 12px;font-size:12px;font-family:var(--font);border-bottom:1px solid;background:#FFFBEB;color:#92400E;border-color:#FDE68A;transition:all .3s;">
  ⏳ Firebase 연결 중...
</div>
<div style="height:33px;"></div>

<div class="toast" id="toast"></div>

<!-- SETTINGS OVERLAY -->
<div class="set-ov" id="set-ov">
  <div class="set-wrap">
    <div class="set-hdr"><div class="set-ht">카테고리 · 우선순위 · 담당자 설정</div><button class="set-x" onclick="closeSet()">&times;</button></div>
    <div class="set-body"><div class="set-cols" id="set-cols"></div></div>
  </div>
</div>

<nav class="sb">
  <div class="sb-top">
    <div class="sb-logo">
      <div class="sb-ic">&#9749;</div>
      <div><div class="sb-nm">업무 관리</div><div class="sb-sm">KRAFTON CAFE</div></div>
    </div>
  </div>
  <div class="sb-date" id="sb-date"></div>

  <div class="sb-lbl">상태</div>
  <div class="sf">
    <button class="sf-b on" data-sf="all" onclick="setSF('all')"><span class="sf-l"><span class="sf-dot" style="background:#A1A1AA"></span>전체</span><span class="sf-n" id="sc-all">0</span></button>
    <button class="sf-b" data-sf="진행중" onclick="setSF('진행중')"><span class="sf-l"><span class="sf-dot" style="background:#3B82F6"></span>진행 중</span><span class="sf-n" id="sc-진행중">0</span></button>
    <button class="sf-b" data-sf="대기" onclick="setSF('대기')"><span class="sf-l"><span class="sf-dot" style="background:#A1A1AA"></span>대기</span><span class="sf-n" id="sc-대기">0</span></button>

/* ── Firebase 연동 상태 표시 ── */
let fbReady = false;
function setFbStatus(ok, msg) {
  const el = document.getElementById("fb-status");
  if (!el) return;
  el.textContent = msg;
  el.style.background  = ok ? "#F0FDF4" : "#FEF2F2";
  el.style.color        = ok ? "#15803D" : "#B91C1C";
  el.style.borderColor  = ok ? "#BBF7D0" : "#FECACA";
}

/* ── Firebase → 로컬 동기화 ── */
function fbListen() {
  // tasks
  db.ref("tasks").on("value", snap => {
    const val = snap.val();
    if (val) {
      // val은 {id1: task, id2: task, ...} 형태
      tasks = Object.entries(val).map(([fbKey, t]) => ({
        ...t, fbKey,
        open: false, editing: false
      })).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      nextId = tasks.reduce((m, t) => Math.max(m, t.id ?? 0), 0) + 1;
    } else {
      tasks = [];
    }
    render();
    setFbStatus(true, "🟢 실시간 연결됨");
    fbReady = true;
  }, err => {
    setFbStatus(false, "🔴 연결 오류: " + err.message);
  });

  // meta
  db.ref("meta").on("value", snap => {
    const val = snap.val();
    if (val) {
      meta = val;
      render();
    }
  });
}

/* ── 저장 함수 오버라이드 ── */
window.fbSaveTasks = function() {
  // 배열을 id 키 객체로 변환해서 저장
  const obj = {};
  tasks.forEach((t, i) => {
    const key = t.fbKey || String(t.id);
    const clean = Object.fromEntries(
      Object.entries(t).filter(([k]) => k !== "fbKey" && k !== "open" && k !== "editing")
    );
    clean.order = i;
    obj[key] = clean;
  });
  db.ref("tasks").set(obj)
    .catch(e => setFbStatus(false, "저장 실패: " + e.message));
};

window.fbDeleteTask = function(fbKey) {
  if (!fbKey) return;
  db.ref("tasks/" + fbKey).remove()
    .catch(e => setFbStatus(false, "삭제 실패: " + e.message));
};

window.fbSaveMeta = function() {
  db.ref("meta").set(meta)
    .catch(e => setFbStatus(false, "설정 저장 실패: " + e.message));
};

window.fbAddTask = function(t) {
  const clean = Object.fromEntries(
    Object.entries(t).filter(([k]) => k !== "fbKey" && k !== "open" && k !== "editing")
  );
  clean.order = tasks.length;
  db.ref("tasks").push(clean)
    .catch(e => setFbStatus(false, "추가 실패: " + e.message));
};

/* 앱 시작 */
fbListen();

</script>

function priOrder(n){const i=meta.pris.findIndex(p=>p.name===n);return i<0?99:i;}

/* ── FILTER + SORT ── */
function getList(){
  const sq=(document.getElementById("fsrch")||{}).value||"";
  const fo=(document.getElementById("fown")||{}).value||"";
  const fs=(document.getElementById("fsort")||{value:"manual"}).value;
  let list=tasks.filter(t=>{
    if(statusFilter!=="all"&&t.status!==statusFilter)return false;
    if(catFilter!=="all"&&t.cat!==catFilter)return false;
    if(fo&&t.owner!==fo)return false;
    if(sq&&!t.title.toLowerCase().includes(sq.toLowerCase()))return false;
    return true;
  });
  if(fs==="dday")list=[...list].sort((a,b)=>{
    const ad=a.dateEnd||a.due||"9999";const bd=b.dateEnd||b.due||"9999";
    return ad.localeCompare(bd);
  });
  else if(fs==="pri")list=[...list].sort((a,b)=>priOrder(a.pri)-priOrder(b.pri));
  else if(fs==="sta"){const STO={지연:0,진행중:1,대기:2,완료:3};list=[...list].sort((a,b)=>(STO[a.status]||9)-(STO[b.status]||9));}

        });
      }

      card.setAttribute("draggable","true");

      card.addEventListener("dragend",()=>{document.querySelectorAll(".tcard").forEach(c=>c.classList.remove("drag-src","drag-top","drag-bot"));dragId=null;});
      card.addEventListener("dragover",e=>{
        e.preventDefault();if(dragId===t.id)return;
        document.querySelectorAll(".tcard").forEach(c=>c.classList.remove("drag-top","drag-bot"));
        const rect=card.getBoundingClientRect();
        dragPos=e.clientY<rect.top+rect.height/2?"top":"bot";
        card.classList.add(dragPos==="top"?"drag-top":"drag-bot");
      });
      card.addEventListener("dragleave",()=>card.classList.remove("drag-top","drag-bot"));
      card.addEventListener("drop",e=>{
        e.preventDefault();document.querySelectorAll(".tcard").forEach(c=>c.classList.remove("drag-top","drag-bot"));

        const fi=tasks.findIndex(x=>x.id===dragId);

        const ni=tasks.findIndex(x=>x.id===t.id);
        tasks.splice(dragPos==="bot"?ni+1:ni,0,moved);
        fbSaveTasks();render();
      });
    }
  });
  }

function chgSt(id,st){const t=tasks.find(x=>x.id===id);if(!t)return;t.status=st;if(st==="완료")t.steps.forEach(s=>s.done=true);fbSaveTasks();render();toast(t.title+" — "+st);}
function delT(id){if(!confirm("이 업무를 삭제할까요?"))return;tasks=tasks.filter(x=>x.id!==id);fbSaveTasks();render();}
function startEdit(id){tasks.forEach(t=>t.editing=false);const t=tasks.find(x=>x.id===id);if(!t)return;t.editing=true;t.open=true;render();setTimeout(()=>{const el=document.getElementById("ef-t-"+id);if(el)el.focus();},50);}
function cancelEdit(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.editing=false;render();}

  const t=tasks.find(x=>x.id===id);if(!t)return;
  const title=document.getElementById("ef-t-"+id).value.trim();if(!title){toast("업무명을 입력해주세요.");return;}

function addES(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;const si=t.steps.length;t.steps.push({lbl:"",done:false});
  const c=document.getElementById("ef-steps-"+id);if(!c)return;
  const d=document.createElement("div");d.className="ser";d.id="er-"+id+"-"+si;
  d.innerHTML="<input type='checkbox' class='step-chk'><input class='sei' placeholder='단계 이름' oninput=\"tasks.find(x=>x.id==="+id+").steps["+si+"].lbl=this.value\"><button class='rm-s' onclick='rmES("+id+","+si+")'>&#215;</button>";
  c.appendChild(d);d.querySelector(".sei").focus();

function rmES(id,si){
  const t=tasks.find(x=>x.id===id);if(!t)return;t.steps.splice(si,1);
  const el=document.getElementById("er-"+id+"-"+si);if(el)el.remove();
  const c=document.getElementById("ef-steps-"+id);
  if(c)c.querySelectorAll(".ser").forEach((row,ni)=>{
    row.id="er-"+id+"-"+ni;
    const rb=row.querySelector(".rm-s");if(rb)rb.onclick=()=>rmES(id,ni);
    const inp=row.querySelector(".sei");if(inp)inp.oninput=function(){tasks.find(x=>x.id===id).steps[ni].lbl=this.value;};
  });
}

function gcalDateFmt(dateStr){return dateStr?dateStr.replace(/-/g,""):""}
function gcalAdd(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const start=t.dateStart||t.dateEnd;
  const end=t.dateEnd||t.dateStart;
  if(!start){toast("시작일 또는 마감일을 먼저 설정해주세요.");return;}
  // Google Calendar end date is exclusive (add 1 day)
  let endExcl=end;
  try{const d=new Date(end);d.setDate(d.getDate()+1);endExcl=d.toISOString().split("T")[0];}catch(e){}
  const title=encodeURIComponent("[카페] "+t.title);
  const detail=encodeURIComponent(
    "카테고리: "+t.cat+"\n담당자: "+(t.owner||"미지정")+"\n우선순위: "+t.pri+
    (t.note?"\n\n메모: "+t.note:"")+
    (t.steps.length?"\n\n진행 단계:\n"+t.steps.map((s,i)=>(s.done?"✓":"○")+" "+(i+1)+". "+s.lbl).join("\n"):"")
  );
  const url="https://calendar.google.com/calendar/render?action=TEMPLATE"+
    "&text="+title+
    "&dates="+gcalDateFmt(start)+"/"+gcalDateFmt(endExcl)+
    "&details="+detail;
  window.open(url,"_blank");
  toast("구글 캘린더가 열렸어요. 저장을 완료해주세요.");
}

/* ── CALENDAR VIEW ── */
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function goToday(){calYear=today.getFullYear();calMonth=today.getMonth();renderCal();}
function renderCal(){
  const MNAMES=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  document.getElementById("cal-month").textContent=calYear+"년 "+MNAMES[calMonth];
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay();
  const totalDays=last.getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  let cells=[];
  // prev month cells
  for(let i=startDay-1;i>=0;i--){
    cells.push({day:prevLast-i,cur:false,date:new Date(calYear,calMonth-1,prevLast-i)});
  }
  // current month
  for(let d=1;d<=totalDays;d++){
    cells.push({day:d,cur:true,date:new Date(calYear,calMonth,d)});
  }
  // next month
  let next=1;while(cells.length%7!==0)cells.push({day:next++,cur:false,date:new Date(calYear,calMonth+1,next-1)});

  const todayStr=today.toISOString().split("T")[0];
  document.getElementById("cal-body").innerHTML=cells.map(cell=>{
    const ds=cell.date.toISOString().split("T")[0];
    const isToday=ds===todayStr;
    // tasks that span this date
    const dayTasks=tasks.filter(t=>{
      const s=t.dateStart||t.dateEnd;const e=t.dateEnd||t.dateStart;
      if(!s&&!e)return false;
      return ds>=s&&ds<=e;
    });
    const MAX=3;const shown=dayTasks.slice(0,MAX);const more=dayTasks.length-MAX;
    const evts=shown.map(t=>{
      const c=catBgColor(t.cat);
      return"<div class='cal-event' style='background:"+c.bg+";color:"+c.tc+";' onclick='focusTask("+t.id+")' title='"+esc(t.title)+"'>"+esc(t.title)+"</div>";
    }).join("");
    const moreHtml=more>0?"<div class='cal-more'>+"+more+"개 더</div>":"";
    return"<div class='cal-cell"+(cell.cur?"":isToday?"":""+(isToday?" today":"")+(cell.cur?"":" other-month"))+(isToday?" today":"")+(cell.cur?"":" other-month")+"'>"+
      "<div class='cal-day'>"+cell.day+"</div>"+evts+moreHtml+"</div>";
  }).join("");
}
function focusTask(id){
  switchTab("list");
  statusFilter="all";catFilter="all";
  document.querySelectorAll("[data-sf]").forEach(b=>b.classList.toggle("on",b.dataset.sf==="all"));
  document.querySelectorAll(".cat-b").forEach(b=>b.classList.toggle("on",b.dataset.cn==="all"));
  const t=tasks.find(x=>x.id===id);if(t){t.open=true;tasks.forEach(x=>{if(x.id!==id)x.open=false;});}
